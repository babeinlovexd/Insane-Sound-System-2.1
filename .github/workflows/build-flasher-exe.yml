name: Build and Upload InsaneFlasher EXE

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-exe:
    runs-on: windows-latest 
    permissions:
      contents: write

    steps:
      - name: Repository clonen
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip' 

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter requests esptool Pillow zeroconf pyinstaller

      - name: InsaneFlasher.exe bauen
        shell: pwsh
        run: |
          cd InsaneFlasher/Linux_Mac
          
          pyinstaller -y `
            --noconsole `
            --onefile `
            --name=InsaneFlasher `
            --icon=logo.ico `
            --add-data="logo.png;." `
            --add-data="logo.ico;." `
            --hidden-import=serial.urlhandler.protocol_socket `
            --collect-data=esptool `
            InsaneFlasher.py

      - name: EXE an Release anhängen
        uses: softprops/action-gh-release@v2
        with:
          files: InsaneFlasher/Linux_Mac/dist/InsaneFlasher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
