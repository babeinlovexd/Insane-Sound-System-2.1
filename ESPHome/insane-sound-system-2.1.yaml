# ##############################################################################
# DISPLAY (ST7789) & UI GLOBALS
# ##############################################################################
script:
  - id: update_status_leds
    mode: restart
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - switch.turn_on: led_green
          else:
            - switch.turn_off: led_green
      - lambda: |-
          std::string status = id(system_status).state;
          std::string source = id(dsp_active_source).state;

          // --- LED ROT: Fehler & Warnungen ---
          if (status != "ok" && status != "OK") {
            id(led_red).turn_on();
          } else {
            id(led_red).turn_off();
          }

          // --- LED BLAU: Bluetooth ---
          // The user requested "Bluetooth" or "BT", but our source string from RP2354 is "Bluetooth"
          if (source == "Bluetooth" || source == "BT") {
            id(led_blue).turn_on();
          } else {
            id(led_blue).turn_off();
          }

          // --- LED WEISS: Home Assistant ---
          // Our source string from RP2354 is "WLAN"
          if (source == "Home Assistant" || source == "WLAN" || source == "HA") {
            id(led_white).turn_on();
          } else {
            id(led_white).turn_off();
          }

          // --- LED GELB: TV ---
          // Our source string from RP2354 is "TOSLINK (TV)"
          if (source == "TV" || source == "SPDIF" || source == "TOSLINK (TV)") {
            id(led_yellow).turn_on();
          } else {
            id(led_yellow).turn_off();
          }

  - id: timer_volume
    mode: restart
    then:
      - delay: 3s
      - globals.set:
          id: ui_mode
          value: '0'

  - id: timer_action
    mode: restart
    then:
      - delay: 1s
      - globals.set:
          id: ui_mode
          value: '0'

  - id: timer_sleep
    mode: restart
    then:
      - delay: 3min
      - if:
          condition:
            not:
              text_sensor.state:
                id: stream_status
                state: "playing"
          then:
            - globals.set:
                id: display_awake
                value: 'false'
            - lambda: |-
                // Display Backlight ausschalten
                id(uart_rp2354).write_str("DIM:0\n");

  - id: wake_display
    mode: single
    then:
      - globals.set:
          id: display_awake
          value: 'true'
      - lambda: |-
          // Display Backlight wiederherstellen
          char buf[20];
          sprintf(buf, "DIM:%.0f\n", id(bl_brightness_slider).state);
          id(uart_rp2354).write_str(buf);

# ST7789 Display
display:
  - platform: st7789v
    id: main_display
    cs_pin: GPIO10
    dc_pin: GPIO9
    reset_pin: GPIO40
    rotation: 90 # Wichtig für 284x76 Querformat
    pages:
      - id: page1
        lambda: |-
          // Wenn Display schlafen soll, nichts zeichnen
          if (!id(display_awake)) {
            return;
          }

          // --- OBERE LEISTE (Y: 0 bis 15) ---
          // 1. Datum & Uhrzeit
          it.strftime(0, 0, id(font_small), TextAlign::TOP_LEFT, "%d.%m. %H:%M", id(ha_time).now());

          // 2. Heißester Spot & Lüfter-Balken (Rechts)
          it.printf(250, 0, id(font_small), TextAlign::TOP_RIGHT, "%.1f°C", id(max_temp).state);

          int fan_bars = (int)(id(fan_speed).state / 25.0);
          for(int i=0; i<fan_bars; i++) {
            it.filled_rect(255 + (i*6), 8 - (i*2), 4, 4 + (i*2), id(my_white));
          }

          // --- MITTLERER BEREICH (Y: 20 bis 55) ---
          if (id(is_muted)) {
             // MUTE Ansicht
             it.print(142, 38, id(font_large), TextAlign::CENTER, "MUTE");

          } else if (id(ui_mode) == 1) {
             // LAUTSTÄRKE Balken
             it.filled_rect(42, 35, (id(encoder_vol).state * 2), 15, id(my_blue)); // max 200px
             it.rect(42, 35, 200, 15, id(my_white)); // Rahmen

          } else if (id(ui_mode) == 2) {
             // ACTION SYMBOL (z.B. "||", ">", "<<", ">>")
             it.printf(142, 38, id(font_large), TextAlign::CENTER, "%s", id(current_action_symbol).c_str());

          } else {
             // STANDARD (Titel & Interpret)
             it.printf(142, 25, id(font_medium), TextAlign::CENTER, "%s", id(bt_track).state.c_str());
             it.printf(142, 45, id(font_small), TextAlign::CENTER, "%s", id(bt_artist).state.c_str());
          }

          // --- UNTERE LEISTE (Y: 60) ---
          // Fehler/Status links unten
          if (id(system_status).state != "ok") {
            it.print(0, 60, id(font_small), id(my_red), TextAlign::TOP_LEFT, id(system_status).state.c_str());
          } else {
            it.print(0, 60, id(font_small), id(my_green), TextAlign::TOP_LEFT, "OK");
          }

          // Source zentriert
          it.printf(142, 60, id(font_small), TextAlign::TOP_CENTER, "%s", id(dsp_active_source).state.c_str());

          // Lautstärke rechts unten
          it.printf(284, 60, id(font_small), TextAlign::TOP_RIGHT, "%d%%", (int)id(encoder_vol).state);

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_medium
    size: 18
  - file: "gfonts://Roboto"
    id: font_large
    size: 24

# ##############################################################################
# AUDIO & MEDIA PLAYER (WLAN / Home Assistant)
# ##############################################################################
i2s_audio:
  - id: i2s_bus
    i2s_bclk_pin: GPIO4
    i2s_lrclk_pin: GPIO5

speaker:
  - platform: i2s_audio
    id: insane_speaker
    dac_type: external
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO6
    channel: stereo
    use_apll: true
    i2s_comm_fmt: stand_msb

  - platform: mixer
    id: insane_mixer
    output_speaker: insane_speaker
    queue_mode: true
    source_speakers:
      - id: media_spk_mixer_input
      - id: announcement_spk_mixer_input

media_player:
  - platform: speaker
    name: "Insane Sound System"
    id: decken_audio
    codec_support_enabled: all
    media_pipeline:
      speaker: media_spk_mixer_input
      format: FLAC
      num_channels: 2
    announcement_pipeline:
      speaker: announcement_spk_mixer_input
      format: FLAC
      num_channels: 2

# ##############################################################################
# BELEUCHTUNG (WS2805 über UART)
# ##############################################################################

output:
  - platform: template
    id: fake_output
    type: float
    write_action:
      - lambda: 'return;'

light:
  - platform: rgbww
    name: "Insane LEDs"
    id: status_led
    red: fake_output
    green: fake_output
    blue: fake_output
    cold_white: fake_output
    warm_white: fake_output
    color_interlock: true
    on_state:
      - lambda: |-
          float r, g, b, w, cw;
          id(status_led).current_values_as_rgbww(&r, &g, &b, &cw, &w);
          char buf[64];
          sprintf(buf, "LED:%u:%u:%u:%u:%u\n",
            (uint8_t)(r * 255),
            (uint8_t)(g * 255),
            (uint8_t)(b * 255),
            (uint8_t)(cw * 255),
            (uint8_t)(w * 255));
          id(uart_rp2354).write_str(buf);

# ##############################################################################
# UARTS & PROXY FLASHING
# ##############################################################################

# Global variables to track flash state and pause metadata/status parsers
# to prevent stealing bytes from the stream_server during proxy flashing.
globals:
  - id: wroom_is_flashing
    type: bool
    initial_value: "false"
  - id: rp2354_is_flashing
    type: bool
    initial_value: "false"
  - id: bt_vol_update_in_progress
    type: bool
    initial_value: "false"
  - id: ui_mode
    type: int
    initial_value: '0' # 0 = Normal, 1 = Volume Bar, 2 = Action Symbol
  - id: is_muted
    type: bool
    initial_value: 'false'
  - id: current_action_symbol
    type: std::string
    initial_value: '""'
  - id: display_awake
    type: bool
    initial_value: 'true'

uart:
  - id: uart_wroom
    tx_pin: GPIO42
    rx_pin: GPIO41
    baud_rate: 115200

  - id: uart_metadata
    tx_pin: GPIO44
    rx_pin: GPIO43
    baud_rate: 115200

  - id: uart_rp2354
    tx_pin: GPIO2
    rx_pin: GPIO1
    baud_rate: 115200
    debug:
      direction: RX
      dummy_receiver: false
      after:
        delimiter: "\n"
      sequence:
        - lambda: |-
            std::string line(bytes.begin(), bytes.end());
            if (line.rfind("CLIP_AMP1:", 0) == 0) {
                int status = atoi(line.substr(10).c_str());
                id(amp1_clip_status).publish_state(status ? "Clips detected!" : "Clear");
            }
            if (line.rfind("CLIP_AMP2:", 0) == 0) {
                int status = atoi(line.substr(10).c_str());
                id(amp2_clip_status).publish_state(status ? "Clips detected!" : "Clear");
            }

# Text sensors to hold Bluetooth metadata and DSP Status
text_sensor:
  - platform: template
    id: bt_track
    name: "Bluetooth Track"
  - platform: template
    id: bt_artist
    name: "Bluetooth Artist"
  - platform: template
    id: bt_album
    name: "Bluetooth Album"
  - platform: template
    id: dsp_active_source
    name: "Active Audio Source"

  - platform: homeassistant
    id: ha_player_state_bridge
    entity_id: ${ha_player_id}
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return id(dsp_active_source).state == "WLAN (S3)" || id(dsp_active_source).state == "WLAN";'
          then:
            - if:
                condition:
                  lambda: 'return x == "playing";'
                then:
                  - text_sensor.template.publish:
                      id: stream_status
                      state: "playing"
                  - script.execute: wake_display
                else:
                  - text_sensor.template.publish:
                      id: stream_status
                      state: "idle"
                  - script.execute: timer_sleep

  - platform: template
    id: stream_status
    name: "Stream Status"
    # Handled by UART reader (BT) and Home Assistant bridges (WLAN)
    on_value:
      - if:
          condition:
            lambda: 'return x == "playing";'
          then:
            - script.execute: wake_display
            - script.stop: timer_sleep
          else:
            - script.execute: timer_sleep

  - platform: template
    id: system_status
    name: "Insane System Status"
    on_value:
      - script.execute: update_status_leds

  - platform: custom
    lambda: |-
      auto my_custom_sensor = new UartReadLineSensor(id(uart_rp2354));
      App.register_component(my_custom_sensor);
      return {my_custom_sensor->temp_rp_sensor, my_custom_sensor->temp_amp_sensor};
    sensors:
      - name: "RP2354 Temp (UART)"
        id: temp_rp_uart
        unit_of_measurement: "°C"
      - name: "Amp Temp (UART)"
        id: temp_amp_uart
        unit_of_measurement: "°C"

  - platform: template
    name: "Amp 1 (Stereo) Clipping"
    id: amp1_clip_status
    icon: "mdi:waveform"

  - platform: template
    name: "Amp 2 (Subwoofer) Clipping"
    id: amp2_clip_status
    icon: "mdi:waveform"

# ##############################################################################
# EXTERNE PYTHON KOMPONENTEN
# ##############################################################################
text:
  - platform: template
    name: "BL Firmware Version"
    id: bl_firmware_version
    mode: text
    internal: true
    optimistic: true
    restore_value: true
    initial_value: "2.1.0.0"

  - platform: template
    name: "RP2354 Firmware Version"
    id: rp2354_firmware_version
    mode: text
    internal: true
    optimistic: true
    restore_value: true
    initial_value: "2.1.0.0"

uart_reader:
  - id: wroom_reader
    uart_id: uart_metadata
    track_sensor: bt_track
    artist_sensor: bt_artist
    album_sensor: bt_album
    stream_status: stream_status
    bt_conn_sensor: bt_connected
    bt_vol_sensor: bt_phone_vol
  - id: dsp_reader
    uart_id: uart_rp2354
    status_sensor: dsp_active_source
    temp_sensor: rp2354_temperature
    fan_sensor: fan_speed
    fault_sensor: amp_fault
    sys_stat: system_status
    is_flashing: rp2354_is_flashing

stream_server:
  - uart_id: uart_wroom
    port: 6666
  - uart_id: uart_rp2354
    port: 6667

web_server:
  port: 80
  version: 3
  include_internal: true

# Template Buttons exposed to REST API to trigger flash/boot sequences
button:
  - platform: template
    name: "WROOM Flash Mode"
    id: wroom_flash_mode
    on_press:
      - logger.log: "Putting WROOM into download mode"
      - lambda: 'id(wroom_is_flashing) = true;'
      - switch.turn_off: wroom_io0
      - switch.turn_off: wroom_en
      - delay: 50ms
      - switch.turn_on: wroom_en

  - platform: template
    name: "WROOM Normal Boot"
    id: wroom_normal_boot
    on_press:
      - logger.log: "Rebooting WROOM normally"
      - switch.turn_on: wroom_io0
      - switch.turn_off: wroom_en
      - delay: 50ms
      - switch.turn_on: wroom_en
      - lambda: 'id(wroom_is_flashing) = false;'

  - platform: template
    name: "BL Play-Pause"
    icon: "mdi:play-pause"
    on_press:
      - lambda: |-
          if (id(stream_status).state == "playing") {
            id(uart_metadata).write_str("PAUSE\n");
            id(stream_status).publish_state("paused");
          } else {
            id(uart_metadata).write_str("PLAY\n");
            id(stream_status).publish_state("playing");
          }

  - platform: template
    name: "BL Nächster Titel"
    icon: "mdi:skip-next"
    on_press:
      - uart.write:
          id: uart_metadata
          data: "NEXT\n"

  - platform: template
    name: "BL Vorheriger Titel"
    icon: "mdi:skip-previous"
    on_press:
      - uart.write:
          id: uart_metadata
          data: "PREV\n"

  - platform: template
    name: "RP2354 Flash Mode"
    id: rp2354_flash_mode
    on_press:
      - globals.set:
          id: rp2354_is_flashing
          value: 'true'
      - logger.log: "Putting RP2354 into bootloader mode"
      - switch.turn_off: rp2354_bootsel
      - switch.turn_off: rp2354_run
      - delay: 50ms
      - switch.turn_on: rp2354_run
      - delay: 50ms
      - switch.turn_on: rp2354_bootsel

  - platform: template
    name: "RP2354 Normal Boot"
    id: rp2354_normal_boot
    on_press:
      - globals.set:
          id: rp2354_is_flashing
          value: 'false'
      - logger.log: "Rebooting RP2354 normally"
      - switch.turn_on: rp2354_bootsel
      - switch.turn_off: rp2354_run
      - delay: 50ms
      - switch.turn_on: rp2354_run
