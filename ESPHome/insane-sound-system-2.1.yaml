# ##############################################################################
# HARDWARE-PIN-BELEGUNG 2.1 (Main ESP32-S3):
#
# [AUDIO - I2S]
# - GPIO 4           : I2S BCLK  -> Zu RP2354 GP0
# - GPIO 5           : I2S LRCK  -> Zu RP2354 GP1
# - GPIO 6           : I2S DOUT  -> Zu RP2354 GP2
#
# [SPI DISPLAY - ST7789]
# - GPIO 11          : SPI MOSI
# - GPIO 12          : SPI SCLK
# - GPIO 10          : SPI CS
# - GPIO 9           : SPI DC
# - GPIO 40          : SPI RES
#
# [I2C BUS]
# - GPIO 8           : I2C SDA -> PCF8574T & LM75AD
# - GPIO 18          : I2C SCL -> PCF8574T & LM75AD
#
# [ROTARY ENCODER]
# - GPIO 15          : Encoder CLK
# - GPIO 16          : Encoder DT
# - GPIO 17          : Encoder SW
#
# [UARTS]
# - GPIO 41/42       : UART0 (Proxy Flash WROOM)
# - GPIO 43/44       : UART1 (Metadata WROOM)
# - GPIO 1/2         : UART2 (Proxy Flash & Control RP2354)
#
# [BOOT CONTROLS]
# - GPIO 39          : WROOM EN
# - GPIO 38          : WROOM IO0
# - GPIO 47          : RP2354 RUN
# - GPIO 48          : RP2354 BOOTSEL
#
# ##############################################################################
# HARDWARE-PIN-BELEGUNG 2.1 (Bluetooth Chip ESP32-WROOM-32D):
#
# [I2S AUDIO SINK]
# - GPIO 26          : I2S BCLK  -> Zu RP2354 GP3
# - GPIO 25          : I2S LRCK  -> Zu RP2354 GP4
# - GPIO 22          : I2S DOUT  -> Zu RP2354 GP5
#
# [STATUS SIGNAL]
# - GPIO 18          : BT Active -> Zu RP2354 GP26
#
# [KOMMUNIKATION & ON-BOARD FLASHING]
# - GPIO 3 / 1       : UART0 RX/TX (Proxy Flash) <- Von ESP32-S3 (GPIO 42/41)
# - GPIO 16 / 17     : UART2 RX/TX (Metadata)    <-> ESP32-S3 (GPIO 44/43)
#
# ##############################################################################
# HARDWARE-PIN-BELEGUNG 2.1 (DSP / Audio Router RP2354A):
#
# [I2S AUDIO IN]
# - GP0 / GP1 / GP2  : I2S IN 1 (WLAN/HA) <- Von ESP32-S3
# - GP3 / GP4 / GP5  : I2S IN 2 (BT)      <- Von ESP32-WROOM
# - GP28             : S/PDIF IN (TOSLINK)
#
# [I2S AUDIO OUT (DUAL MASTER PIO)]
# - GP6 / GP7        : I2S OUT BCLK/LRCK
# - GP8 / GP9        : I2S OUT DOUT 1/2 -> Amp 1 & 2
#
# [VERSTÄRKER STEUERUNG - MA12070P]
# - GP12 / GP13      : I2C SDA/SCL
# - GP14 / GP15      : Fault 1 & 2
# - GP16 / GP17      : Enable 1 & 2
#
# [PWM & LEDS]
# - GP18             : Gehäuselüfter (PWM)
# - GP19             : Display Backlight (PWM)
# - GP20             : WS2805 LED Data (via Level Shifter)
#
# [STATUS SIGNAL & UARTS]
# - GP26             : BT Active <- Von ESP32-WROOM
# - GP21 / GP24      : UART RX/TX (Proxy Flash & Status) <- ESP32-S3 (GPIO 2/1)
#
# ##############################################################################

# =====================================================================
# 🚩USER-KONFIGURATION (Hier die Entität vom ISS anpassen, falls nötig!)🚩
# =====================================================================
substitutions:
  ha_player_id: "media_player.insane_sound_system" #<---- ID hier anpassen!

# ##############################################################################
# SYSTEM & WLAN
# ##############################################################################
esphome:
  name: insane-sound-system-2-1
  friendly_name: "Insane Sound System 2.1 (Master)"
  project:
    name: "babeinlovexd.insane_sound_system_2.1"
    version: "0.1.0"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
  flash_size: 16MB

external_components:
  - source:
      type: git
      url: https://github.com/babeinlovexd/Insane-Sound-System-2.1
    components: [ stream_server, uart_reader ]
    refresh: 0s
  - source:
      type: git
      url: https://github.com/babeinlovexd/insane_package_report
    components: [ insane_package_report ]
    refresh: 0s

insane_package_report:

psram:
  mode: octal
  speed: 80MHz

api:
  encryption:
    key: !secret api_encryption_key
  homeassistant_services: true

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  power_save_mode: none
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "Insane-Sound Fallback"
    password: !secret ap_password
  on_connect:
    - script.execute: update_status_leds
  on_disconnect:
    - script.execute: update_status_leds

time:
  - platform: homeassistant
    id: ha_time

color:
  - id: my_white
    red: 100%
    green: 100%
    blue: 100%
  - id: my_blue
    red: 0%
    green: 50%
    blue: 100%
  - id: my_red
    red: 100%
    green: 0%
    blue: 0%
  - id: my_green
    red: 0%
    green: 100%
    blue: 0%

# ##############################################################################
# BUS-SYSTEME (I2C, SPI)
# ##############################################################################
i2c:
  sda: GPIO8
  scl: GPIO18
  scan: true
  frequency: 400000
  id: i2c_bus

# SPI Bus for Display
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11

# ##############################################################################
# SENSOREN (Temperatur, Lüfter, System)
# ##############################################################################
sensor:
  - platform: template
    name: "Bluetooth Phone Volume"
    id: bt_phone_vol
    unit_of_measurement: "%"
    on_value:
      - lambda: |-
          id(bt_vol_update_in_progress) = true;
          id(encoder_vol).set_value(x);
          id(bt_vol_update_in_progress) = false;

  - platform: rotary_encoder
    name: "Volume Encoder"
    pin_a: GPIO15
    pin_b: GPIO16
    id: encoder_vol
    resolution: 4
    min_value: 0
    max_value: 100
    on_value:
      - globals.set:
          id: ui_mode
          value: '1'
      - lambda: |-
          char buf[20];
          sprintf(buf, "VOL:%.0f\n", x);
          id(uart_rp2354).write_str(buf);

          // Sync volume to the Bluetooth chip only if not triggered by BT
          if (!id(bt_vol_update_in_progress)) {
              char buf_bt[25];
              sprintf(buf_bt, "SET_BT_VOL:%.0f\n", x);
              id(uart_metadata).write_str(buf_bt);
          }

      - homeassistant.service:
          service: media_player.volume_set
          data:
            entity_id: ${ha_player_id}
            volume_level: !lambda "return x / 100.0;"
      - script.execute: timer_volume

  - platform: wifi_signal
    name: "WLAN Signal"
    update_interval: 60s

  - platform: internal_temperature
    name: "ESP32 Intern Temp"

  - platform: uptime
    name: "System Laufzeit"

  # Environmental Temp
  - platform: tmp102
    name: "ESP Ambient Temperature"
    id: temp_env
    address: 0x48
    update_interval: 10s

  # Amplifier Temp
  - platform: tmp102
    name: "MA12070P Temperature"
    id: temp_amp
    address: 0x49
    update_interval: 10s

  # Power Supply Temp
  - platform: tmp102
    name: "TPS5430 Temperature"
    id: temp_psu
    address: 0x4A
    update_interval: 10s

  # RP2354 Internal Temp parsed via UART
  - platform: template
    name: "RP2354 DSP Temperature"
    id: rp2354_temperature
    unit_of_measurement: "°C"
    device_class: "temperature"

  # RP2354 Fan Speed parsed via UART
  - platform: template
    name: "Fan Speed"
    id: fan_speed
    unit_of_measurement: "%"

  # Helper template for the maximum temperature
  - platform: template
    name: "Max Temperature"
    id: max_temp
    lambda: |-
      float t1 = id(temp_env).state;
      float t2 = id(temp_amp).state;
      float t3 = id(temp_psu).state;
      float t4 = id(rp2354_temperature).state;
      float t5 = id(temp_amp_uart).state; // <-- HIER: Die internen MA-Temperaturen vom RP!

      if (isnan(t1)) t1 = 0;
      if (isnan(t2)) t2 = 0;
      if (isnan(t3)) t3 = 0;
      if (isnan(t4)) t4 = 0;
      if (isnan(t5)) t5 = 0;

      return std::max({t1, t2, t3, t4, t5});
    on_value:
      - lambda: |-
          // Calculate perfect fan curve
          float hottest = x;
          int fan_speed_cmd = 0;
          if (hottest >= 80.0) {       // <-- Kleine Anpassung: 85°C vom Amp triggert direkt 100%
            fan_speed_cmd = 100;
          } else if (hottest > 70.0) {
            fan_speed_cmd = 100;
          } else if (hottest > 60.0) {
            fan_speed_cmd = 60;
          } else if (hottest > 50.0) {
            fan_speed_cmd = 35; // Min Power is 30, so 35 is safe
          } else if (hottest < 48.0) {
            fan_speed_cmd = 0; // Turn off
          } else {
            // Hysteresis, keep previous speed
            fan_speed_cmd = id(fan_speed).state;
            if (isnan(fan_speed_cmd)) fan_speed_cmd = 0;
          }

          char fan_buf[20];
          sprintf(fan_buf, "FAN:%d\n", fan_speed_cmd);
          id(uart_rp2354).write_str(fan_buf);
          id(fan_speed).publish_state(fan_speed_cmd);

interval:
  - interval: 10s
    then:
      - lambda: |-
          // Broadcast TMP102 Thermal data to RP2354 over UART2
          // Format: THERMAL:amb_temp:amp_temp:psu_temp
          float amb = id(temp_env).state;
          float amp = id(temp_amp).state;
          float psu = id(temp_psu).state;
          if (isnan(amb)) amb = 0;
          if (isnan(amp)) amp = 0;
          if (isnan(psu)) psu = 0;

          char buf[64];
          sprintf(buf, "THERMAL:%.1f:%.1f:%.1f\n", amb, amp, psu);
          id(uart_rp2354).write_str(buf);

# ##############################################################################
# HARDWARE-STEUERUNG (Switches, Expander, Buttons)
# ##############################################################################
pcf8574:
  - id: pcf_ui
    address: 0x20

switch:
  # Boot Control Pins for WROOM
  - platform: gpio
    id: wroom_en
    pin: GPIO39
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: wroom_io0
    pin: GPIO38
    restore_mode: ALWAYS_ON

  # Boot Control Pins for RP2354
  - platform: gpio
    id: rp2354_run
    pin: GPIO47
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: rp2354_bootsel
    pin: GPIO48
    restore_mode: ALWAYS_ON

  - platform: gpio
    name: "Red LED"
    id: led_red
    pin:
      pcf8574: pcf_ui
      number: 3
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "White LED"
    id: led_white
    pin:
      pcf8574: pcf_ui
      number: 4
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "Blue LED"
    id: led_blue
    pin:
      pcf8574: pcf_ui
      number: 5
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "Green LED (Ready)"
    id: led_green
    pin:
      pcf8574: pcf_ui
      number: 6
      mode: OUTPUT
      inverted: true
    restore_mode: ALWAYS_ON

  - platform: gpio
    name: "Yellow LED"
    id: led_yellow
    pin:
      pcf8574: pcf_ui
      number: 7
      mode: OUTPUT
      inverted: true

binary_sensor:
  - platform: template
    name: "Bluetooth Connected"
    id: bt_connected
    on_value:
      - if:
          condition:
            lambda: 'return x;'
          then:
            - switch.turn_on: led_blue
          else:
            - switch.turn_off: led_blue

  # RP2354 Amp Fault parsed via UART
  - platform: template
    name: "Amp Fault"
    id: amp_fault

  - platform: gpio
    name: "Button Prev"
    pin:
      pcf8574: pcf_ui
      number: 0
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - uart.write:
          id: uart_metadata
          data: "PREV\n"
      - homeassistant.service:
          service: media_player.media_previous_track
          data:
            entity_id: ${ha_player_id}

  - platform: gpio
    name: "Button Play/Pause"
    pin:
      pcf8574: pcf_ui
      number: 1
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - lambda: |-
          if (id(stream_status).state == "playing") {
            id(uart_metadata).write_str("PAUSE\n");
            id(stream_status).publish_state("paused");
          } else {
            id(uart_metadata).write_str("PLAY\n");
            id(stream_status).publish_state("playing");
          }
      - homeassistant.service:
          service: media_player.media_play_pause
          data:
            entity_id: ${ha_player_id}

  - platform: gpio
    name: "Button Next"
    pin:
      pcf8574: pcf_ui
      number: 2
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - uart.write:
          id: uart_metadata
          data: "NEXT\n"
      - homeassistant.service:
          service: media_player.media_next_track
          data:
            entity_id: ${ha_player_id}

  # Rotary Encoder (Direct inputs)
  - platform: gpio
    name: "Encoder Button"
    pin:
      number: GPIO17
      mode: INPUT_PULLUP
      inverted: true
    id: encoder_btn
    on_press:
      - script.execute: wake_display
      - globals.set:
          id: ui_mode
          value: '2'
      - if:
          condition:
            lambda: 'return id(is_muted);'
          then:
            - globals.set:
                id: is_muted
                value: 'false'
            - globals.set:
                id: current_action_symbol
                value: '">"'
            - uart.write:
                id: uart_rp2354
                data: "MUTE:0\n"
            - uart.write:
                id: uart_metadata
                data: "PLAY\n"
          else:
            - globals.set:
                id: is_muted
                value: 'true'
            - globals.set:
                id: current_action_symbol
                value: '"||"'
            - uart.write:
                id: uart_rp2354
                data: "MUTE:1\n"
            - uart.write:
                id: uart_metadata
                data: "PAUSE\n"
      - homeassistant.service:
          service: media_player.media_play_pause
          data:
            entity_id: ${ha_player_id}
      - script.execute: timer_action

