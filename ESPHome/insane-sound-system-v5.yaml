esphome:
  name: insane-sound-system-v5
  friendly_name: "Insane Sound System V5"
  project:
    name: "babeinlovexd.insane_sound_system"
    version: "5.5.1"
  on_boot:
    priority: 100
    then:
      - light.turn_on:
          id: status_led
          effect: "None"
          red: 50%
          green: 0%
          blue: 100% 
          brightness: 50%
      - delay: 5s 
      - script.execute: update_status_led
      - delay: 2s
      - button.press: bl_normal_start

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
  flash_size: 16MB

external_components:
  - source:
      type: git
      url: https://github.com/babeinlovexd/Insane-Sound-System
    components: [ stream_server ]
    refresh: 0s
  - source:
      type: git
      url: https://github.com/babeinlovexd/esph-ws2805
    components: [ ws2805 ]
    refresh: 0s
  - source:
      type: git
      url: https://github.com/babeinlovexd/insane_package_report
    components: [ insane_package_report ]
    refresh: 0s

insane_package_report:

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  homeassistant_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  power_save_mode: none
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  on_connect:
    - script.execute: update_status_led
  on_disconnect:
    - script.execute: update_status_led
  ap:
    ssid: "Insane-Sound Fallback"
    password: !secret ap_password

network:
  enable_high_performance: false   

stream_server:
  - uart_id: uart_bl
    port: 8888

web_server:
  port: 80
  version: 3
  
captive_portal:

globals:
  - id: is_flashing
    type: bool
    initial_value: 'false'

# ##############################################################################
# BUS-SYSTEME (I2C, I2S & UART)
# ##############################################################################

i2c:
  sda: GPIO8  # S3 Pin 12 (Label: GPIO8)
  scl: GPIO9  # S3 Pin 15 (Label: GPIO9)
  scan: true
  frequency: 100kHz
  timeout: 100ms

i2s_audio:
  - id: i2s_bus
    i2s_bclk_pin: GPIO15  # S3 Pin 8 (Label: GPIO15 / MTDO)
    i2s_lrclk_pin: GPIO16 # S3 Pin 9 (Label: GPIO16 / MTDI)

uart:
  id: uart_bl
  tx_pin: GPIO1  # S3 Pin 41 (Label: GPIO1) -> Geht an ESP BL RX
  rx_pin: GPIO2  # S3 Pin 40 (Label: GPIO2) -> Geht an ESP BL TX
  baud_rate: 115200

# ##############################################################################
# AUDIO & MEDIA PLAYER (WLAN / Home Assistant)
# ##############################################################################

speaker:
  - platform: i2s_audio
    id: insane_speaker
    dac_type: external
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO17  # S3 Pin 10 (Label: GPIO17 / MTCK)
    channel: stereo
    use_apll: true
    i2s_comm_fmt: stand_msb

  - platform: mixer
    id: insane_mixer
    output_speaker: insane_speaker
    queue_mode: true
    source_speakers:
      - id: media_spk_mixer_input
      - id: announcement_spk_mixer_input

media_player:
  - platform: speaker
    name: "Insane Sound System"
    id: decken_audio
    codec_support_enabled: all
    media_pipeline:
      speaker: media_spk_mixer_input
      format: FLAC
      num_channels: 2
    announcement_pipeline:
      speaker: announcement_spk_mixer_input
      format: FLAC
      num_channels: 2
    on_mute:
      - switch.turn_off: amp_power
      - script.execute: update_status_led
    on_unmute:
      - switch.turn_on: amp_power
      - script.execute: update_status_led
    on_play:
      - switch.turn_on: amp_power
      - script.execute: update_status_led
    on_pause:
      - switch.turn_off: amp_power
      - script.execute: update_status_led
    on_idle:
      - switch.turn_off: amp_power
      - script.execute: update_status_led

#################################
# BELEUCHTUNG 
# ##############################################################################

# Wird komplett aus den Packages geladen!

# ##############################################################################
# HARDWARE STEUERUNG (Switches, Buttons & Lüfter)
# ##############################################################################

switch:
  - platform: gpio
    pin: GPIO10  # S3  (Label: GPIO10)
    name: "Verstärker Power"
    entity_category: "config"
    id: amp_power
    restore_mode: ALWAYS_OFF 

  - platform: gpio
    pin: GPIO11  # S3 Pin 18 (Label: GPIO12)
    name: "Insane Turbo Mode"
    id: insane_mode
    restore_mode: ALWAYS_OFF
    inverted: true

  - platform: gpio
    pin: GPIO18  # S3 Pin 11 (Label: GPIO18)
    id: mux_select
    name: "Audio Quelle (Intern)"
    entity_category: "config"
    restore_mode: ALWAYS_ON # ON (HIGH) = B2 Eingang = S3/WLAN aktiv
    
  - platform: gpio
    pin: GPIO07
    id: bl_en_pin
    name: "WROOM EN (Reset)"
    internal: true
    entity_category: "config"
    restore_mode: ALWAYS_ON # Muss HIGH sein, damit der WROOM normal läuft

  - platform: gpio
    pin: GPIO39
    id: bl_io0_pin
    name: "WROOM IO0 (Boot)"
    internal: true
    entity_category: "config"
    restore_mode: ALWAYS_ON # Muss HIGH sein, außer beim Flashen

button:
  - platform: restart
    name: "ESP32 Neustart"
    id: system_neustart

  - platform: template
    name: "BL Play-Pause"
    icon: "mdi:play-pause"
    on_press:
      - lambda: |-
          if (id(bl_playback_state).state == "PLAYING") {
            id(uart_bl).write_str("PAUSE\n");
            id(bl_playback_state).publish_state("PAUSED");
          } else {
            id(uart_bl).write_str("PLAY\n");
            id(bl_playback_state).publish_state("PLAYING");
          }

  - platform: template
    name: "BL Nächster Titel"
    icon: "mdi:skip-next"
    on_press:
      - uart.write: "NEXT\n"

  - platform: template
    name: "BL Vorheriger Titel"
    icon: "mdi:skip-previous"
    on_press:
      - uart.write: "PREV\n"
      
  - platform: template
    name: "WROOM in Flash-Modus setzen"
    id: flash_wroom_btn
    entity_category: "config"
    icon: "mdi:bluetooth-transfer"
    on_press:
      - globals.set:
          id: is_flashing
          value: 'true'
      - logger.log: "Bringe WROOM in den Bootloader-Modus..."
      # Hardware-Reset Sequenz für den WROOM 
      - switch.turn_off: bl_io0_pin     # IO0 auf LOW (Download Mode)
      - delay: 100ms
      - switch.turn_off: bl_en_pin      # Reset auslösen (LOW)
      - delay: 100ms
      - switch.turn_on: bl_en_pin       # Reset loslassen (WROOM startet im Bootloader)
      - delay: 500ms
      - switch.turn_on: bl_io0_pin      # IO0 wieder freigeben (Modus bleibt aktiv)
      - logger.log: "WROOM bereit! Starte jetzt das .bat-Tool auf deinem PC."

  - platform: template
    name: "WROOM Normal starten"
    entity_category: "config"
    id: bl_normal_start
    icon: "mdi:play"
    on_press:
      - globals.set:
          id: is_flashing
          value: 'false'
      - logger.log: "Starte WROOM normal neu..."
      - switch.turn_on: bl_io0_pin      
      - switch.turn_off: bl_en_pin      
      - delay: 100ms
      - switch.turn_on: bl_en_pin       

number:
  - platform: template
    name: "Bluetooth Lautstärke"
    id: bl_volume_slider
    icon: "mdi:volume-high"
    min_value: 0
    max_value: 127
    step: 5
    initial_value: 100
    optimistic: true
    set_action:
      then:
        - lambda: |-
            char buf[20];
            sprintf(buf, "SET_VOL:%.0f\n", x);
            id(uart_bl).write_str(buf);

output:
  - platform: ledc
    pin: GPIO42  # S3 Pin 39 (Label: MTMS / GPIO42)
    id: fan_pwm
    frequency: 50 Hz 
    min_power: 0.30
    zero_means_zero: true 

fan:
  - platform: speed
    output: fan_pwm
    entity_category: "config"
    name: "Gehäuse Lüfter"
    id: the_fan

# ##############################################################################
# SENSOREN & BLUETOOTH-LOGIK
# ##############################################################################

binary_sensor:
  - platform: gpio
    pin: 
      number: GPIO12  # S3 (Label: GPIO12)
      mode: INPUT_PULLUP 
    name: "Verstärker Störung"
    id: amp_fault
    entity_category: "diagnostic"
    device_class: problem
    filters:
      - invert: {}      
      - delayed_on: 50ms 
    on_press:
      then:
        - switch.turn_off: amp_power
        - logger.log: "ALARM: TPA3110 meldet Fehler (Hitze/Kurzschluss)! Notabschaltung."
        - script.execute: update_status_led
    on_release:
      then:
        - script.execute: update_status_led

  # ---Hardware-Umschaltung des I2S-Buses ---
  - platform: gpio
    pin: 
      number: GPIO3  # S3 Pin 13 (Label: GPIO3) -> Signal vom ESP BL
      mode: INPUT_PULLDOWN
    name: "Bluetooth Stream Aktiv"
    id: music_active_bl
    on_press:
      - logger.log: "Bluetooth aktiv! Schalte Hardware-Multiplexer auf Bluetooth (B1)."
      - media_player.stop: decken_audio
      - delay: 100ms
      - switch.turn_off: mux_select # LOW = Mux schaltet auf B1 (Bluetooth)
      - switch.turn_on: amp_power
      - script.execute: update_status_led
      - text_sensor.template.publish:
          id: media_status
          state: "Bluetooth aktiv"
    on_release:
      - logger.log: "Bluetooth beendet. Schalte Hardware-Multiplexer auf WLAN (B2)."
      - switch.turn_on: mux_select # HIGH = Mux schaltet auf B2 (S3/HA)
      - switch.turn_off: amp_power
      - script.execute: update_status_led
      - text_sensor.template.publish:
          id: media_title
          state: !lambda 'return id(ha_title_bridge).state.length() > 0 ? id(ha_title_bridge).state : "Bereit";'
      - text_sensor.template.publish:
          id: media_artist
          state: !lambda 'return id(ha_artist_bridge).state.length() > 0 ? id(ha_artist_bridge).state : "-";'
      - text_sensor.template.publish:
          id: media_album
          state: !lambda 'return id(ha_album_bridge).state.length() > 0 ? id(ha_album_bridge).state : "-";'
      - text_sensor.template.publish:
          id: media_status
          state: "WLAN aktiv"

sensor:
  - platform: wifi_signal
    name: "WLAN Signal"
    update_interval: 60s
  
  - platform: internal_temperature
    name: "ESP32 Intern Temp"
  
  - platform: uptime
    name: "System Laufzeit"

  - platform: tmp102
    address: 0x48
    name: "Temp Verstärker"
    id: temp_tpa
    update_interval: 10s
    filters:
      - sliding_window_moving_average: 
          window_size: 5
          send_every: 1

  - platform: tmp102
    address: 0x49
    name: "Temp Spannungsregler"
    id: temp_mp
    update_interval: 10s
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

  - platform: tmp102
    address: 0x4A
    name: "Temp ESP32 Umgebung"
    id: temp_esp
    update_interval: 10s
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

# Metadaten (Universell für WLAN & Bluetooth)
text_sensor:
  # --- 1. Die universellen, sichtbaren Sensoren ---
  - platform: template
    id: bl_playback_state
    internal: true

  - platform: template
    name: "Aktueller Titel"
    id: media_title
    icon: "mdi:music"

  - platform: template
    name: "Aktueller Interpret"
    id: media_artist
    icon: "mdi:account-music"

  - platform: template
    name: "Aktuelles Album"
    id: media_album
    icon: "mdi:album"

  - platform: template
    name: "Wiedergabe Status"
    id: media_status
    icon: "mdi:play-network"
  
  - platform: template
    name: "BL Firmware Version"
    id: bl_version
    icon: "mdi:chip"

  # --- 2. Die Brücken zu Home Assistant ---
  - platform: homeassistant
    id: ha_title_bridge
    entity_id: ${ha_player_id}
    attribute: media_title
    internal: true
    on_value:
      - if:
          condition:
            switch.is_on: mux_select
          then:
            - text_sensor.template.publish:
                id: media_title
                state: !lambda 'return x.length() > 0 ? x : "WLAN Stream";'

  - platform: homeassistant
    id: ha_artist_bridge
    entity_id: ${ha_player_id}
    attribute: media_artist
    internal: true
    on_value:
      - if:
          condition:
            switch.is_on: mux_select
          then:
            - text_sensor.template.publish:
                id: media_artist
                state: !lambda 'return x.length() > 0 ? x : "-";'

  - platform: homeassistant
    id: ha_album_bridge
    entity_id: ${ha_player_id}
    attribute: media_album_name
    internal: true
    on_value:
      - if:
          condition:
            switch.is_on: mux_select
          then:
            - text_sensor.template.publish:
                id: media_album
                state: !lambda 'return x.length() > 0 ? x : "-";'

# ##############################################################################
# AUTOMATISIERUNG & INTERVALLE
# ##############################################################################
script:
  - id: fan_kickstart
    mode: restart
    parameters:
      target_speed: int
    then:
      - delay: 1s
      - lambda: |-
          auto call = id(the_fan).make_call();
          call.set_state(true);
          call.set_speed(target_speed);
          call.perform();

  - id: update_status_led
    mode: restart 
    then:
      # Prio 1: Hardware-Fehler am Verstärker 
      - if:
          condition:
            binary_sensor.is_on: amp_fault
          then:
            - light.turn_on: { id: status_led, effect: "Amp_Fault", brightness: 70% }
          
          # Prio 2: WLAN Verbindung verloren
          else:
            - if:
                condition:
                  not:
                    wifi.connected:
                then:
                  - light.turn_on: { id: status_led, effect: "Error_Blink", brightness: 70% }
                
                # Prio 3: Bluetooth Stream läuft
                else:
                  - if:
                      condition:
                        binary_sensor.is_on: music_active_bl
                      then:
                        - light.turn_on: { id: status_led, effect: "None", red: 0%, green: 0%, blue: 100%, brightness: 70% }
                      
                      # Prio 4: Alles Prima (Idle)
                      else:
                        - light.turn_on: { id: status_led, effect: "None", red: 0%, green: 100%, blue: 0%, brightness: 30% }

interval:
  # 1.Lüfter-Logik (Temperatur-basiert)
  - interval: 10s
    then:
      - lambda: |-
          float t1 = id(temp_tpa).state;
          float t2 = id(temp_mp).state;
          float t3 = id(temp_esp).state;
          
          if (isnan(t1)) t1 = 0;
          if (isnan(t2)) t2 = 0;
          if (isnan(t3)) t3 = 0;

          float max_temp = max(t1, max(t2, t3));
          static bool fan_active = false; 

          if (max_temp > 50.0) {
            fan_active = true;
          } 
          else if (max_temp < 48.0) {
            fan_active = false;
          }

          if (fan_active) {
            float speed_pct = (max_temp - 50.0) / 25.0; 
            if (speed_pct > 1.0) speed_pct = 1.0;
            if (speed_pct < 0.3) speed_pct = 0.3; 

            int steps = id(the_fan).get_traits().supported_speed_count();
            int target_speed = (int)(speed_pct * steps);

            if (!id(the_fan).state) {
              // Kickstart if fan is currently off
              auto call = id(the_fan).make_call();
              call.set_state(true);
              call.set_speed(steps); // 100%
              call.perform();
              ESP_LOGD("custom_fan", "Max Temp: %.1f°C -> Lüfter KICKSTART (100%%)", max_temp);

              id(fan_kickstart).execute(target_speed);
            } else {
              // Normal speed update
              auto call = id(the_fan).make_call();
              call.set_state(true);
              call.set_speed(target_speed);
              call.perform();
              ESP_LOGD("custom_fan", "Max Temp: %.1f°C -> Lüfter: %.0f%%", max_temp, speed_pct * 100);
            }
          } else {
            if (id(the_fan).state) {
              auto call = id(the_fan).make_call();
              call.set_state(false);
              call.perform();          
              ESP_LOGD("custom_fan", "Max Temp: %.1f°C -> Lüfter AUS (Cool-Down)", max_temp);
            }
          }

  # 2. UART Daten lesen und zuordnen 
  - interval: 100ms
    id: uart_reader
    then:
      - lambda: |-
          if (id(is_flashing)) return;

          static std::string buffer = "";
          while (id(uart_bl).available()) {
            uint8_t byte;
            id(uart_bl).read_byte(&byte);
            char c = (char)byte;
            
            if (c == '\n') {
              std::string line = buffer;
              buffer = "";
              
              // Metadaten Parser
              if (line.rfind("TITLE:", 0) == 0) {
                id(media_title).publish_state(line.substr(6));
              } else if (line.rfind("ARTIST:", 0) == 0) {
                id(media_artist).publish_state(line.substr(7));
              } else if (line.rfind("ALBUM:", 0) == 0) {
                id(media_album).publish_state(line.substr(6));
              } else if (line.find("STATUS:PLAY") == 0) {
                id(media_status).publish_state("Wiedergabe");
                id(bl_playback_state).publish_state("PLAYING");
              } else if (line.find("STATUS:PAUSE") == 0) {
                id(media_status).publish_state("Pause");
                id(bl_playback_state).publish_state("PAUSED");
              } else if (line.find("STATUS:OFFLINE") == 0) {
                id(media_status).publish_state("Getrennt");
                id(bl_playback_state).publish_state("PAUSED");
                id(media_title).publish_state("Bereit");
                id(media_artist).publish_state("-");
                id(bl_version).publish_state("0.0");
              } 
              else if (line.rfind("VERSION:", 0) == 0) {
                id(bl_version).publish_state(line.substr(8));
              }
              
              // Lautstärke-Rückmeldung vom ESP BL synchronisieren
              else if (line.rfind("VOL:", 0) == 0) {
                float vol = atof(line.substr(4).c_str());
                auto call = id(bl_volume_slider).make_call();
                call.set_value(vol);
                call.perform();
              }
            } else if (c != '\r') {
              buffer += c;
            }
          }
