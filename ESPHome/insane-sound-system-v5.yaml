# ##############################################################################
# HARDWARE-PIN-BELEGUNG V5 (Main ESP32-S3):
#
# [AUDIO & MULTIPLEXER - SN74CB3Q3257]
# - GPIO 15          : I2S BCK  (WLAN/HA) -> Mux Eingang 1B2
# - GPIO 16          : I2S LRCK (WLAN/HA) -> Mux Eingang 2B2
# - GPIO 17          : I2S DATA (WLAN/HA) -> Mux Eingang 3B2
# - GPIO 18          : Mux Select         -> LOW = Bluetooth (B1), HIGH = WLAN/HA (B2)
#
# [BLUETOOTH KOMMUNIKATION & FLASHING - WROOM-32D]
# - GPIO 3           : Music Status In    <- Von WROOM GPIO 14 (Triggert den Mux)
# - GPIO 1           : UART TX Out        -> Zu WROOM RX0 (GPIO 3) (via 470 Ohm)
# - GPIO 2           : UART RX In         <- Von WROOM TX0 (GPIO 1) (via 470 Ohm)
# - GPIO 7           : WROOM EN (Reset)   -> Zu WROOM EN-Pin (via 1k Ohm)
# - GPIO 39          : WROOM IO0 (Boot)   -> Zu WROOM IO0-Pin (via 1k Ohm)
#
# [VERSTÄRKER STEUERUNG - TPA3110]
# - GPIO 10          : Amp Power (SD)     -> HIGH = An, LOW = Aus (Standby)
# - GPIO 11          : Gain (Turbo)       -> Insane Mode Switch (Inverted Logik)
# - GPIO 12          : Amp Fault In       <- Störungsmeldung vom TPA3110 (Pull-Up)
#
# [BELEUCHTUNG - WS2811 ZONEN via Level Shifter]
# - GPIO 4           : LED Zone 1 Daten   -> Zum SN74AHCT125 Level Shifter
# - GPIO 5           : LED Zone 2 Daten   -> Zum SN74AHCT125 Level Shifter
# - GPIO 6           : LED Zone 3 Daten   -> Zum SN74AHCT125 Level Shifter
# - GPIO 48          : LED                -> Onboard  
#
# [KLIMA & SENSOREN]
# - GPIO 42          : Lüfter PWM Out     -> Steuert 24V Gehäuselüfter 
# - GPIO 8           : I2C SDA            -> Temp-Sensoren & Expansion
# - GPIO 9           : I2C SCL            -> Temp-Sensoren & Expansion
#
# [SYSTEM, DEBUGGING & SPEICHER]
# - GPIO 43          : UART TX0           -> Debugging (Expansion Header)
# - GPIO 44          : UART RX0           -> Debugging (Expansion Header)
# - GPIO 33 bis 37   : RESERVIERT         -> NICHT NUTZEN! (Für 8MB Octal PSRAM)
#
# ##############################################################################
# HARDWARE-PIN-BELEGUNG V5 (Bluetooth Chip ESP32-WROOM-32D):
#
# [STROMVERSORGUNG & SYSTEM]
# - 3V3 Pin          : Power In           <- Von AMS1117-3.3 (mit 10µF & 100nF Kerkos)
# - GND Pins         : Masse              -> An Ground-Plane (Bodenpad zwingend verlöten!)
# - EN Pin           : Reset-Logik        <- Von S3 GPIO 7 (via 1k Ohm) 
#                                            (+ 10k Pull-Up zu 3.3V & 1µF Kerko zu GND)
# - IO0 (GPIO 0)     : Flash-Trigger      <- Von S3 GPIO 39 (via 1k Ohm) 
#                                            (+ 10k Pull-Up zu 3.3V)
#
# [KOMMUNIKATION & ON-BOARD FLASHING (UART0)]
# - GPIO 3 (RX0)     : Daten/Flash Empfang<- Von S3 GPIO 1 (TX) (via 470 Ohm)
# - GPIO 1 (TX0)     : Daten/Meta Senden  -> Zu S3 GPIO 2 (RX) (via 470 Ohm)
#
# [AUDIO & MULTIPLEXER]
# - GPIO 27          : I2S BCK            -> Mux Eingang 1B1
# - GPIO 25          : I2S LRCK (WS)      -> Mux Eingang 2B1
# - GPIO 26          : I2S DATA (DOUT)    -> Mux Eingang 3B1
# - GPIO 14          : Music Status Out   -> Zu S3 GPIO 3 (HIGH = Play, LOW = Pause/Offline)
# ##############################################################################

# =====================================================================
# 🚩USER-KONFIGURATION (Hier die Entität vom ISS anpassen, falls nötig!)🚩
# =====================================================================
substitutions:
  ha_player_id: "media_player.insane_sound_system" #<---- ID hier anpassen!
# ##############################################################################
packages:
