# ##############################################################################
# HARDWARE-PIN-BELEGUNG V6 (Main ESP32-S3):
#
# [AUDIO - I2S]
# - GPIO 4           : I2S BCLK  -> Zu RP2354 GP0
# - GPIO 5           : I2S LRCK  -> Zu RP2354 GP1
# - GPIO 6           : I2S DOUT  -> Zu RP2354 GP2
#
# [SPI DISPLAY - ST7789]
# - GPIO 11          : SPI MOSI
# - GPIO 12          : SPI SCLK
# - GPIO 10          : SPI CS
# - GPIO 9           : SPI DC
# - GPIO 40          : SPI RES
#
# [I2C BUS]
# - GPIO 8           : I2C SDA -> PCF8574T & LM75AD
# - GPIO 18          : I2C SCL -> PCF8574T & LM75AD
#
# [ROTARY ENCODER]
# - GPIO 15          : Encoder CLK
# - GPIO 16          : Encoder DT
# - GPIO 17          : Encoder SW
#
# [UARTS]
# - GPIO 41/42       : UART0 (Proxy Flash WROOM)
# - GPIO 43/44       : UART1 (Metadata WROOM)
# - GPIO 1/2         : UART2 (Proxy Flash & Control RP2354)
#
# [BOOT CONTROLS]
# - GPIO 39          : WROOM EN
# - GPIO 38          : WROOM IO0
# - GPIO 47          : RP2354 RUN
# - GPIO 48          : RP2354 BOOTSEL
#
# ##############################################################################
# HARDWARE-PIN-BELEGUNG V6 (Bluetooth Chip ESP32-WROOM-32D):
#
# [I2S AUDIO SINK]
# - GPIO 26          : I2S BCLK  -> Zu RP2354 GP3
# - GPIO 25          : I2S LRCK  -> Zu RP2354 GP4
# - GPIO 22          : I2S DOUT  -> Zu RP2354 GP5
#
# [STATUS SIGNAL]
# - GPIO 18          : BT Active -> Zu RP2354 GP26
#
# [KOMMUNIKATION & ON-BOARD FLASHING]
# - GPIO 3 / 1       : UART0 RX/TX (Proxy Flash) <- Von ESP32-S3 (GPIO 42/41)
# - GPIO 16 / 17     : UART2 RX/TX (Metadata)    <-> ESP32-S3 (GPIO 44/43)
#
# ##############################################################################
# HARDWARE-PIN-BELEGUNG V6 (DSP / Audio Router RP2354B):
#
# [I2S AUDIO IN]
# - GP0 / GP1 / GP2  : I2S IN 1 (WLAN/HA) <- Von ESP32-S3
# - GP3 / GP4 / GP5  : I2S IN 2 (BT)      <- Von ESP32-WROOM
# - GP28             : S/PDIF IN (TOSLINK)
#
# [I2S AUDIO OUT (DUAL MASTER PIO)]
# - GP6 / GP7        : I2S OUT BCLK/LRCK
# - GP8 / GP9        : I2S OUT DOUT 1/2 -> Amp 1 & 2
#
# [VERSTÄRKER STEUERUNG - MA12070P]
# - GP12 / GP13      : I2C SDA/SCL
# - GP14 / GP15      : Fault 1 & 2
# - GP16 / GP17      : Enable 1 & 2
#
# [PWM & LEDS]
# - GP18             : Gehäuselüfter (PWM)
# - GP19             : Display Backlight (PWM)
# - GP20             : WS2805 LED Data (via Level Shifter)
#
# [STATUS SIGNAL & UARTS]
# - GP26             : BT Active <- Von ESP32-WROOM
# - GP21 / GP24      : UART RX/TX (Proxy Flash & Status) <- ESP32-S3 (GPIO 2/1)
#
# ##############################################################################

# =====================================================================
# 🚩USER-KONFIGURATION (Hier die Entität vom ISS anpassen, falls nötig!)🚩
# =====================================================================
substitutions:
  name: insane-sound-system-v6
  friendly_name: Insane Sound System V6 (Master)
  ha_player_id: "media_player.insane_sound_system" #<---- ID hier anpassen!

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: "babeinlovexd.insane_sound_system_v6"
    version: "6.0.0"
  includes:
    - uart_reader.h

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
  flash_size: 16MB

external_components:
  - source: components
  - source:
      type: git
      url: https://github.com/babeinlovexd/Insane-Sound-System
    components: [ stream_server ]
    refresh: 0s
  - source:
      type: git
      url: https://github.com/babeinlovexd/insane_package_report
    components: [ insane_package_report ]
    refresh: 0s

insane_package_report:

psram:
  mode: octal
  speed: 80MHz

api:
  encryption:
    key: !secret api_encryption_key
  homeassistant_services: true

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  power_save_mode: none
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "Insane-Sound Fallback"
    password: !secret ap_password

time:
  - platform: homeassistant
    id: ha_time

color:
  - id: my_white
    red: 100%
    green: 100%
    blue: 100%
  - id: my_blue
    red: 0%
    green: 50%
    blue: 100%
  - id: my_red
    red: 100%
    green: 0%
    blue: 0%

# I2C Bus for UI Expander and Temp Sensor
i2c:
  sda: GPIO8
  scl: GPIO18
  scan: true
  id: i2c_bus

# Thermal Management (LM75AD Sensors and RP2354)
sensor:
  # Environmental Temp
  - platform: lm75
    name: "ESP Ambient Temperature"
    id: temp_env
    address: 0x48
    update_interval: 10s

  # Amplifier Temp
  - platform: lm75
    name: "MA12070P Temperature"
    id: temp_amp
    address: 0x49
    update_interval: 10s

  # Power Supply Temp
  - platform: lm75
    name: "TPS5430 Temperature"
    id: temp_psu
    address: 0x4A
    update_interval: 10s

  # RP2354 Internal Temp parsed via UART
  - platform: template
    name: "RP2354 DSP Temperature"
    id: rp2354_temperature
    unit_of_measurement: "°C"
    device_class: "temperature"

  # RP2354 Fan Speed parsed via UART
  - platform: template
    name: "Fan Speed"
    id: fan_speed
    unit_of_measurement: "%"

  # Helper template for the maximum temperature
  - platform: template
    name: "Max Temperature"
    id: max_temp
    lambda: |-
      float t1 = id(temp_env).state;
      float t2 = id(temp_amp).state;
      float t3 = id(temp_psu).state;
      float t4 = id(rp2354_temperature).state;
      if (isnan(t1)) t1 = 0;
      if (isnan(t2)) t2 = 0;
      if (isnan(t3)) t3 = 0;
      if (isnan(t4)) t4 = 0;
      return std::max({t1, t2, t3, t4});

interval:
  - interval: 10s
    then:
      - lambda: |-
          // Broadcast LM75 Thermal data to RP2354 over UART2
          // Format: THERMAL:amb_temp:amp_temp:psu_temp
          float amb = id(temp_env).state;
          float amp = id(temp_amp).state;
          float psu = id(temp_psu).state;
          if (isnan(amb)) amb = 0;
          if (isnan(amp)) amp = 0;
          if (isnan(psu)) psu = 0;

          char buf[64];
          sprintf(buf, "THERMAL:%.1f:%.1f:%.1f\n", amb, amp, psu);
          id(uart_rp2354).write_str(buf);

# PCF8574T UI Expander (Buttons/LEDs)
pcf8574:
  - id: pcf_ui
    address: 0x20

switch:
  - platform: gpio
    name: "LED 1"
    pin:
      pcf8574: pcf_ui
      number: 0
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "LED 2"
    pin:
      pcf8574: pcf_ui
      number: 1
      mode: OUTPUT
      inverted: true

  # Boot Control Pins for WROOM
  - platform: gpio
    id: wroom_en
    pin: GPIO39
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: wroom_io0
    pin: GPIO38
    restore_mode: ALWAYS_ON

  # Boot Control Pins for RP2354
  - platform: gpio
    id: rp2354_run
    pin: GPIO47
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: rp2354_bootsel
    pin: GPIO48
    restore_mode: ALWAYS_ON

binary_sensor:
  # RP2354 Amp Fault parsed via UART
  - platform: template
    name: "Amp Fault"
    id: amp_fault

  - platform: gpio
    name: "Button 1"
    pin:
      pcf8574: pcf_ui
      number: 2
      mode: INPUT_PULLUP
      inverted: true
  - platform: gpio
    name: "Button 2"
    pin:
      pcf8574: pcf_ui
      number: 3
      mode: INPUT_PULLUP
      inverted: true

# Rotary Encoder (Direct inputs)
  - platform: gpio
    name: "Encoder Button"
    pin:
      number: GPIO17
      mode: INPUT_PULLUP
      inverted: true
    id: encoder_btn
    on_press:
      - globals.set:
          id: ui_mode
          value: '2'
      - if:
          condition:
            lambda: 'return id(is_muted);'
          then:
            - globals.set:
                id: is_muted
                value: 'false'
            - globals.set:
                id: current_action_symbol
                value: '">"'
            - uart.write:
                id: uart_rp2354
                data: "MUTE:0\n"
          else:
            - globals.set:
                id: is_muted
                value: 'true'
            - globals.set:
                id: current_action_symbol
                value: '"||"'
            - uart.write:
                id: uart_rp2354
                data: "MUTE:1\n"
      - homeassistant.service:
          service: media_player.media_play_pause
          data:
            entity_id: ${ha_player_id}
      - script.execute: timer_action

sensor:
  - platform: rotary_encoder
    name: "Volume Encoder"
    pin_a: GPIO15
    pin_b: GPIO16
    id: encoder_vol
    resolution: 4
    min_value: 0
    max_value: 100
    on_value:
      - globals.set:
          id: ui_mode
          value: '1'
      - lambda: |-
          char buf[20];
          sprintf(buf, "VOL:%.0f\n", x);
          id(uart_rp2354).write_str(buf);
      - homeassistant.service:
          service: media_player.volume_set
          data:
            entity_id: ${ha_player_id}
            volume_level: !lambda "return x / 100.0;"
      - script.execute: timer_volume

# SPI Bus for Display
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11

globals:
  - id: ui_mode
    type: int
    initial_value: '0' # 0 = Normal, 1 = Volume Bar, 2 = Action Symbol
  - id: is_muted
    type: bool
    initial_value: 'false'
  - id: current_action_symbol
    type: std::string
    initial_value: '""'
  - id: display_awake
    type: bool
    initial_value: 'true'

script:
  - id: timer_volume
    mode: restart
    then:
      - delay: 3s
      - globals.set:
          id: ui_mode
          value: '0'

  - id: timer_action
    mode: restart
    then:
      - delay: 1s
      - globals.set:
          id: ui_mode
          value: '0'

  - id: timer_sleep
    mode: restart
    then:
      - delay: 3min
      - if:
          condition:
            not:
              text_sensor.state:
                id: stream_status
                state: "playing"
          then:
            - globals.set:
                id: display_awake
                value: 'false'

# ST7789 Display
display:
  - platform: st7789v
    id: main_display
    cs_pin: GPIO10
    dc_pin: GPIO9
    reset_pin: GPIO40
    rotation: 90 # Wichtig für 284x76 Querformat
    pages:
      - id: page1
        lambda: |-
          // Wenn Display schlafen soll, nichts zeichnen
          if (!id(display_awake)) {
            return;
          }

          // --- OBERE LEISTE (Y: 0 bis 15) ---
          // 1. Datum & Uhrzeit
          it.strftime(0, 0, id(font_small), TextAlign::TOP_LEFT, "%d.%m. %H:%M", id(ha_time).now());

          // 2. Heißester Spot & Lüfter-Balken (Rechts)
          it.printf(250, 0, id(font_small), TextAlign::TOP_RIGHT, "%.1f°C", id(max_temp).state);

          int fan_bars = (int)(id(fan_speed).state / 25.0);
          for(int i=0; i<fan_bars; i++) {
            it.filled_rect(255 + (i*6), 8 - (i*2), 4, 4 + (i*2), id(my_white));
          }

          // --- MITTLERER BEREICH (Y: 20 bis 55) ---
          if (id(is_muted)) {
             // MUTE Ansicht
             it.print(142, 38, id(font_large), TextAlign::CENTER, "MUTE");

          } else if (id(ui_mode) == 1) {
             // LAUTSTÄRKE Balken
             it.filled_rect(42, 35, (id(encoder_vol).state * 2), 15, id(my_blue)); // max 200px
             it.rect(42, 35, 200, 15, id(my_white)); // Rahmen

          } else if (id(ui_mode) == 2) {
             // ACTION SYMBOL (z.B. "||", ">", "<<", ">>")
             it.printf(142, 38, id(font_large), TextAlign::CENTER, "%s", id(current_action_symbol).c_str());

          } else {
             // STANDARD (Titel & Interpret)
             it.printf(142, 25, id(font_medium), TextAlign::CENTER, "%s", id(bt_track).state.c_str());
             it.printf(142, 45, id(font_small), TextAlign::CENTER, "%s", id(bt_artist).state.c_str());
          }

          // --- UNTERE LEISTE (Y: 60) ---
          // Fehler links unten
          if (id(amp_fault).state) {
            it.print(0, 60, id(font_small), id(my_red), TextAlign::TOP_LEFT, "FAULT");
          }

          // Source zentriert
          it.printf(142, 60, id(font_small), TextAlign::TOP_CENTER, "%s", id(dsp_active_source).state.c_str());

          // Lautstärke rechts unten
          it.printf(284, 60, id(font_small), TextAlign::TOP_RIGHT, "%d%%", (int)id(encoder_vol).state);

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_medium
    size: 18
  - file: "gfonts://Roboto"
    id: font_large
    size: 24

# I2S Audio Output (To RP2354)
i2s_audio:
  - id: i2s_bus
    i2s_bclk_pin: GPIO4
    i2s_lrclk_pin: GPIO5

speaker:
  - platform: i2s_audio
    id: insane_speaker
    dac_type: external
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO6
    channel: stereo
    use_apll: true
    i2s_comm_fmt: stand_msb

  - platform: mixer
    id: insane_mixer
    output_speaker: insane_speaker
    queue_mode: true
    source_speakers:
      - id: media_spk_mixer_input
      - id: announcement_spk_mixer_input

media_player:
  - platform: speaker
    name: "Insane Sound System"
    id: decken_audio
    codec_support_enabled: all
    media_pipeline:
      speaker: media_spk_mixer_input
      format: FLAC
      num_channels: 2
    announcement_pipeline:
      speaker: announcement_spk_mixer_input
      format: FLAC
      num_channels: 2

# Global variables to track flash state and pause metadata/status parsers
# to prevent stealing bytes from the stream_server during proxy flashing.
globals:
  - id: wroom_is_flashing
    type: bool
    initial_value: "false"
  - id: rp2354_is_flashing
    type: bool
    initial_value: "false"

# Multi UART Setup for independent Proxy Flashing and Metadata
uart:
  - id: uart_wroom
    tx_pin: GPIO42
    rx_pin: GPIO41
    baud_rate: 115200

  - id: uart_metadata
    tx_pin: GPIO44
    rx_pin: GPIO43
    baud_rate: 115200

  - id: uart_rp2354
    tx_pin: GPIO2
    rx_pin: GPIO1
    baud_rate: 115200

# Text sensors to hold Bluetooth metadata and DSP Status
text_sensor:
  - platform: template
    id: bt_track
    name: "Bluetooth Track"
  - platform: template
    id: bt_artist
    name: "Bluetooth Artist"
  - platform: template
    id: dsp_active_source
    name: "Active Audio Source"

  - platform: homeassistant
    id: ha_player_state_bridge
    entity_id: ${ha_player_id}
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return id(dsp_active_source).state == "WLAN (S3)" || id(dsp_active_source).state == "WLAN";'
          then:
            - if:
                condition:
                  lambda: 'return x == "playing";'
                then:
                  - text_sensor.template.publish:
                      id: stream_status
                      state: "playing"
                  - globals.set:
                      id: display_awake
                      value: 'true'
                else:
                  - text_sensor.template.publish:
                      id: stream_status
                      state: "idle"
                  - script.execute: timer_sleep

  - platform: template
    id: stream_status
    name: "Stream Status"
    # Handled by UART reader (BT) and Home Assistant bridges (WLAN)

# Custom Component to read lines from UART and populate sensors
custom_component:
  - lambda: |-
      auto *wroom_reader = new custom_uart_reader::CustomUARTReader(
          id(uart_metadata), id(bt_track), id(bt_artist), nullptr, nullptr, nullptr, nullptr, id(stream_status), nullptr);
          // Note: WROOM Metadata UART is isolated, no proxy byte stealing is possible.

      auto *dsp_reader = new custom_uart_reader::CustomUARTReader(
          id(uart_rp2354), nullptr, nullptr, id(dsp_active_source), id(rp2354_temperature), id(fan_speed), id(amp_fault), nullptr, &id(rp2354_is_flashing));
          // DSP shares UART2 for Metadata & Proxy, so we pass the flashing boolean to pause reading.

      App.register_component(wroom_reader);
      App.register_component(dsp_reader);
      return {wroom_reader, dsp_reader};

# Custom Stream Servers (Uses the external component defined in components/stream_server)
# As explicitly requested, this embeds your modified V5 stream_server logic.
stream_server:
  - uart_id: uart_wroom
    port: 6666
  - uart_id: uart_rp2354
    port: 6667

web_server:
  port: 80
  version: 3

# Template Buttons exposed to REST API to trigger flash/boot sequences
button:
  - platform: template
    name: "WROOM Flash Mode"
    id: wroom_flash_mode
    on_press:
      - logger.log: "Putting WROOM into download mode"
      - lambda: 'id(wroom_is_flashing) = true;'
      - switch.turn_off: wroom_io0
      - switch.turn_off: wroom_en
      - delay: 50ms
      - switch.turn_on: wroom_en

  - platform: template
    name: "WROOM Normal Boot"
    id: wroom_normal_boot
    on_press:
      - logger.log: "Rebooting WROOM normally"
      - switch.turn_on: wroom_io0
      - switch.turn_off: wroom_en
      - delay: 50ms
      - switch.turn_on: wroom_en
      - lambda: 'id(wroom_is_flashing) = false;'

  - platform: template
    name: "RP2354 Flash Mode"
    id: rp2354_flash_mode
    on_press:
      - logger.log: "Putting RP2354 into bootloader mode"
      - switch.turn_off: rp2354_bootsel
      - switch.turn_off: rp2354_run
      - delay: 50ms
      - switch.turn_on: rp2354_run
      - delay: 50ms
      - switch.turn_on: rp2354_bootsel
