light:
  - platform: esp32_rmt_led_strip
    name: "Licht Zone 1"
    id: light_1
    pin: GPIO4
    num_leds: 30
    chipset: SK6812
    is_rgbw: true
    rgb_order: RGB  
    rmt_symbols: 48     
    effects: &effekte 
      - addressable_rainbow:
          name: "Regenbogen"
      - addressable_color_wipe:
          name: "Wisch-Effekt"
      - addressable_scan:
          name: "Knight Rider"
      - addressable_twinkle:
          name: "Funkeln"
      - addressable_fireworks:
          name: "Feuerwerk"

  - platform: esp32_rmt_led_strip
    name: "Licht Zone 2"
    id: light_2        
    pin: GPIO5
    num_leds: 30
    chipset: SK6812
    is_rgbw: true
    rgb_order: RGB 
    rmt_symbols: 48      
    effects: *effekte

  - platform: esp32_rmt_led_strip
    name: "Licht Zone 3"
    id: light_3        
    pin: GPIO6
    num_leds: 30
    chipset: SK6812
    is_rgbw: true
    rgb_order: RGB
    rmt_symbols: 48      
    effects: *effekte

  - platform: esp32_rmt_led_strip
    name: "Mainboard Status LED"
    id: status_led
    pin: GPIO48
    internal: true
    num_leds: 1
    chipset: WS2812 
    rgb_order: GRB  
    rmt_symbols: 48      
    effects: 
      - strobe:
          name: "Error_Blink" 
          colors:
            - state: true
              red: 100%
              green: 0%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 500ms
      - strobe:
          name: "Amp_Fault" 
          colors:
            - state: true
              red: 100%
              green: 0%
              blue: 0%
              duration: 200ms
            - state: true
              red: 100%
              green: 100%
              blue: 0% 
              duration: 200ms